<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Watcher — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      font-size: 14px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"],
    input[type="url"] {
      width: 100%;
      padding: 8px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4a6fa5;
    }

    .folder-row {
      display: flex;
      gap: 8px;
    }

    .folder-row input {
      flex: 1;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-browse {
      background: #2a3a5c;
      color: #e0e0e0;
      white-space: nowrap;
    }

    .btn-browse:hover {
      background: #3a4a6c;
    }

    .btn-save {
      background: #4a6fa5;
      color: #fff;
      width: 100%;
      padding: 10px;
      margin-top: 24px;
    }

    .btn-save:hover {
      background: #5a7fb5;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      -webkit-app-region: no-drag;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #e0e0e0;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #4a6fa5;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .toggle-label {
      font-size: 14px;
      color: #e0e0e0;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .form-group {
      flex: 1;
    }

    .status-bar {
      margin-top: 16px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .status-bar.success {
      color: #4caf50;
    }
  </style>
</head>
<body>
  <h1>Audio Watcher Settings</h1>

  <div class="form-group">
    <label>Watch Folder</label>
    <div class="folder-row">
      <input type="text" id="watchFolder" placeholder="~/Videos">
      <button class="btn btn-browse" id="btnBrowse">Browse</button>
    </div>
  </div>

  <div class="form-group">
    <label>Server URL</label>
    <input type="url" id="serverUrl" placeholder="http://localhost:3000">
  </div>

  <div class="form-group">
    <label>Extensions (comma-separated)</label>
    <input type="text" id="extensions" placeholder=".mp4, .mkv, .webm, .flv, .mov, .avi">
  </div>

  <div class="row">
    <div class="form-group">
      <label>Max Concurrent</label>
      <input type="number" id="maxConcurrent" min="1" max="10" value="1">
    </div>
    <div class="form-group">
      <label>Max Retries</label>
      <input type="number" id="maxRetries" min="1" max="20" value="5">
    </div>
    <div class="form-group">
      <label>Min Disk Space (GB)</label>
      <input type="number" id="minDiskSpaceGB" min="0" step="0.5" value="2">
    </div>
  </div>

  <div class="form-group">
    <div class="toggle-group">
      <label class="toggle">
        <input type="checkbox" id="deleteWavAfterUpload">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Delete WAV after upload</span>
    </div>
  </div>

  <div class="form-group">
    <div class="toggle-group">
      <label class="toggle">
        <input type="checkbox" id="processExisting">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Process existing files on startup</span>
    </div>
  </div>

  <button class="btn btn-save" id="btnSave">Save &amp; Restart Watcher</button>
  <div class="status-bar" id="statusBar">Ready</div>

  <script>
    // Web shim — only active when not running in Electron (preload sets window.watcherAPI)
    if (!window.watcherAPI) {
      window.watcherAPI = {
        getConfig: () => fetch('/api/config').then(r => r.json()),
        saveConfig: (cfg) => fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        }).then(r => r.json()),
        browseFolder: () => Promise.resolve(prompt('Enter folder path:'))
      };
    }
  </script>
  <script src="settings-renderer.js"></script>
</body>
</html>
