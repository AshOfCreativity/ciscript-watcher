<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Watcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      background: #0f0f23;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: #ccc;
      background: #16213e;
    }

    .tab-btn.active {
      color: #4a6fa5;
      border-bottom-color: #4a6fa5;
    }

    /* Tab content */
    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .tab-content.active {
      display: block;
    }

    /* Queue tab */
    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .queue-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .queue-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-approve-all {
      background: #4a6fa5;
      color: #fff;
    }

    .btn-approve-all:hover {
      background: #5a7fb5;
    }

    .btn-approve-all:disabled {
      background: #333;
      color: #666;
      cursor: default;
    }

    .btn-clear-done {
      background: #2a3a5c;
      color: #e0e0e0;
    }

    .btn-clear-done:hover {
      background: #3a4a6c;
    }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 6px;
      border-left: 3px solid #333;
    }

    .file-row.status-awaiting_approval {
      border-left-color: #f59e0b;
    }

    .file-row.status-pending,
    .file-row.status-extracting,
    .file-row.status-uploading,
    .file-row.status-polling {
      border-left-color: #3b82f6;
    }

    .file-row.status-completed {
      border-left-color: #22c55e;
    }

    .file-row.status-failed {
      border-left-color: #ef4444;
    }

    .file-row.status-rejected {
      border-left-color: #6b7280;
      opacity: 0.6;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-awaiting {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .badge-active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .badge-completed {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .badge-failed {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .badge-rejected {
      background: rgba(107, 114, 128, 0.15);
      color: #6b7280;
    }

    .file-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-action {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-action-approve {
      background: #22c55e;
      color: #fff;
    }

    .btn-action-approve:hover {
      background: #16a34a;
    }

    .btn-action-reject {
      background: #6b7280;
      color: #fff;
    }

    .btn-action-reject:hover {
      background: #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #666;
      font-size: 14px;
    }

    .empty-state p:first-child {
      font-size: 24px;
      margin-bottom: 8px;
    }

    /* Settings tab — reuse existing styles */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"],
    input[type="url"] {
      width: 100%;
      padding: 8px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4a6fa5;
    }

    .folder-row {
      display: flex;
      gap: 8px;
    }

    .folder-row input {
      flex: 1;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-browse {
      background: #2a3a5c;
      color: #e0e0e0;
      white-space: nowrap;
    }

    .btn-browse:hover {
      background: #3a4a6c;
    }

    .btn-save {
      background: #4a6fa5;
      color: #fff;
      width: 100%;
      padding: 10px;
      margin-top: 24px;
    }

    .btn-save:hover {
      background: #5a7fb5;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      -webkit-app-region: no-drag;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #e0e0e0;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #4a6fa5;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .toggle-label {
      font-size: 14px;
      color: #e0e0e0;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .form-group {
      flex: 1;
    }

    .status-bar {
      margin-top: 16px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .status-bar.success {
      color: #4caf50;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 20px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #222;
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="queue">Queue</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <!-- Queue Tab -->
  <div id="tab-queue" class="tab-content active">
    <div class="queue-header">
      <h2>File Queue</h2>
      <div class="queue-actions">
        <button class="btn-sm btn-approve-all" id="btnApproveAll" disabled>Approve All</button>
        <button class="btn-sm btn-clear-done" id="btnClearDone">Clear Done</button>
      </div>
    </div>
    <div class="file-list" id="fileList">
      <div class="empty-state">
        <p>No files detected yet</p>
        <p>Drop video files into your watch folder to get started</p>
      </div>
    </div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab-content">
    <div class="form-group">
      <label>Watch Folder</label>
      <div class="folder-row">
        <input type="text" id="watchFolder" placeholder="~/Videos">
        <button class="btn btn-browse" id="btnBrowse">Browse</button>
      </div>
    </div>

    <div class="form-group">
      <label>Server URL</label>
      <input type="url" id="serverUrl" placeholder="http://localhost:3000">
    </div>

    <div class="form-group">
      <label>Extensions (comma-separated)</label>
      <input type="text" id="extensions" placeholder=".mp4, .mkv, .webm, .flv, .mov, .avi">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Max Concurrent</label>
        <input type="number" id="maxConcurrent" min="1" max="10" value="1">
      </div>
      <div class="form-group">
        <label>Max Retries</label>
        <input type="number" id="maxRetries" min="1" max="20" value="5">
      </div>
      <div class="form-group">
        <label>Min Disk Space (GB)</label>
        <input type="number" id="minDiskSpaceGB" min="0" step="0.5" value="2">
      </div>
    </div>

    <div class="form-group">
      <div class="toggle-group">
        <label class="toggle">
          <input type="checkbox" id="deleteWavAfterUpload">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Delete WAV after upload</span>
      </div>
    </div>

    <div class="form-group">
      <div class="toggle-group">
        <label class="toggle">
          <input type="checkbox" id="processExisting">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Process existing files on startup</span>
      </div>
    </div>

    <div class="section-label">Approval &amp; File Control</div>

    <div class="form-group">
      <div class="toggle-group">
        <label class="toggle">
          <input type="checkbox" id="requireApproval">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Require approval before processing</span>
      </div>
    </div>

    <div class="form-group">
      <label>Output Directory (WAV extraction target)</label>
      <div class="folder-row">
        <input type="text" id="outputDir" placeholder="Default: next to source video">
        <button class="btn btn-browse" id="btnBrowseOutput">Browse</button>
      </div>
    </div>

    <div class="form-group">
      <label>Archive Directory (move originals after success)</label>
      <div class="folder-row">
        <input type="text" id="archiveDir" placeholder="Default: leave in place">
        <button class="btn btn-browse" id="btnBrowseArchive">Browse</button>
      </div>
    </div>

    <button class="btn btn-save" id="btnSave">Save Settings</button>
    <div class="status-bar" id="statusBar">Ready</div>
  </div>

  <script>
    // Web shim — only active when not running in Electron (preload sets window.watcherAPI)
    if (!window.watcherAPI) {
      window.watcherAPI = {
        getConfig: () => fetch('/api/config').then(r => r.json()),
        saveConfig: (cfg) => fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        }).then(r => r.json()),
        browseFolder: () => Promise.resolve(prompt('Enter folder path:')),
        getQueue: () => fetch('/api/queue').then(r => r.json()).catch(() => []),
        approveFile: () => Promise.resolve(),
        rejectFile: () => Promise.resolve(),
        approveAll: () => Promise.resolve(),
        onQueueUpdated: () => {},
        removeQueueListener: () => {}
      };
    }
  </script>
  <script src="queue-renderer.js"></script>
  <script src="settings-renderer.js"></script>
</body>
</html>
